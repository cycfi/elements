name: Build
on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      job:
        description: 'Which job(s) to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - skia
          - cairo
          - quartz2d
env:
  BUILD_TYPE: Release
jobs:

  ###########################################################################
  # Skia  (vcpkg-built Skia m148; GL on Linux/Windows, Metal host on macOS)
  ###########################################################################
  build-skia:
    name: "Skia (${{ matrix.config.name }})"
    if: >
      github.event_name != 'workflow_dispatch' ||
      inputs.job == 'all' ||
      inputs.job == 'skia'
    runs-on: ${{ matrix.config.os }}
    permissions:
      packages: write
      contents: read
    env:
      # vcpkg binary cache, keyed by package ABI hash (compiler + portfile +
      # triplet). Three layers, in read priority:
      #   1. http  -> public anonymous read from Cloudflare R2 (media.cycfi.com);
      #              this is what lets a fresh clone / fork restore with no auth.
      #   2. x-aws -> CI-only authenticated write of new archives to the same R2
      #              bucket via the S3 API (AWS CLI redirected by AWS_ENDPOINT_URL).
      # A cold build (cache miss) is uploaded once via x-aws; thereafter every
      # run, fork, and clone restores anonymously over http. (NuGet and the
      # removed x-gha backend are no longer used.)
      VCPKG_BINARY_SOURCES: "clear;http,https://media.cycfi.com/vcpkg-cache/{sha}.zip,read;x-aws,s3://cycfi-media/vcpkg-cache/,write"
      # R2 (S3-compatible) credentials for the x-aws write layer. Withheld from
      # fork PR runs by GitHub; x-aws write then no-ops and http read still works.
      AWS_ENDPOINT_URL: "https://24c350f8d000d722e6bcc12e3b03469a.r2.cloudflarestorage.com"
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: auto
    strategy:
      fail-fast: false
      matrix:
        config:
        # --- x86-64 ---
        - name: "Windows MSVC x64"
          os: windows-latest
          triplet: x64-windows
          environment_script: "C:/Program Files/Microsoft Visual Studio/2022/Enterprise/VC/Auxiliary/Build/vcvars64.bat"
        # NOTE: macOS Intel (macos-13 / x64-osx) is deferred — GitHub is
        # retiring Intel macOS runners (all current hosted macOS runners are
        # arm64), so the job never gets picked up. Seed x64-osx locally from an
        # Intel Mac with R2 write creds instead. Revisit if a runner appears.
        - name: "Ubuntu GCC x64"
          # 22.04 (glibc 2.35) sets the prebuilt-bundle floor — see SkiaPrebuilt.
          os: ubuntu-22.04
          triplet: x64-linux
          pkg_config_path: "/usr/lib/x86_64-linux-gnu/pkgconfig:/usr/share/pkgconfig"
        # --- arm64 ---
        # NOTE: windows-11-arm / arm64-windows is deferred — the VS ARM64
        # toolchain on that runner needs a vswhere-based vcvars lookup (the
        # hardcoded Enterprise path fails: CMAKE_C_COMPILER not set). Revisit.
        - name: "macOS Clang arm64"
          os: macos-latest
          triplet: arm64-osx
          pkg_config_path: "/opt/homebrew/lib/pkgconfig"
        - name: "Ubuntu GCC arm64"
          # 22.04 (glibc 2.35) sets the prebuilt-bundle floor — see SkiaPrebuilt.
          os: ubuntu-22.04-arm
          triplet: arm64-linux
          pkg_config_path: "/usr/lib/aarch64-linux-gnu/pkgconfig:/usr/share/pkgconfig"
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install dependencies (Ubuntu)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libgtk-3-dev \
          libgl1-mesa-dev \
          libglu1-mesa-dev \
          libegl1-mesa-dev \
          libharfbuzz-dev \
          libfontconfig1-dev \
          libfreetype6-dev \
          x11proto-dev \
          libx11-dev \
          libxext-dev \
          shared-mime-info \
          pkg-config \
          ninja-build \
          autoconf \
          autoconf-archive \
          automake \
          libtool \
          zstd

    - name: Install dependencies (macOS)
      if: runner.os == 'macOS'
      run: brew install fontconfig freetype harfbuzz ninja

    - name: Install dependencies (Windows)
      if: runner.os == 'Windows'
      run: choco install ninja
      shell: cmd

    - name: Bootstrap vcpkg (Unix)
      if: runner.os != 'Windows'
      run: lib/artist/lib/external/vcpkg/bootstrap-vcpkg.sh -disableMetrics

    - name: Bootstrap vcpkg (Windows)
      if: runner.os == 'Windows'
      run: lib\artist\lib\external\vcpkg\bootstrap-vcpkg.bat -disableMetrics
      shell: cmd

    - name: Configure
      shell: cmake -P {0}
      run: |
        # On Windows, import the MSVC environment (cl/link on PATH).
        if ("${{ runner.os }}" STREQUAL "Windows")
          execute_process(
            COMMAND "${{ matrix.config.environment_script }}" && set
            OUTPUT_FILE environment_script_output.txt)
          file(STRINGS environment_script_output.txt output_lines)
          foreach(line IN LISTS output_lines)
            if (line MATCHES "^([a-zA-Z0-9_-]+)=(.*)$")
              set(ENV{${CMAKE_MATCH_1}} "${CMAKE_MATCH_2}")
            endif()
          endforeach()
        endif()

        set(vcpkg_toolchain
          "$ENV{GITHUB_WORKSPACE}/lib/artist/lib/external/vcpkg/scripts/buildsystems/vcpkg.cmake")
        # Triplet is pinned per matrix entry (the runner arch must match, or
        # vcpkg picks a default that mislinks).
        set(extra_args
          -DELEMENTS_SKIA=ON
          -DCMAKE_TOOLCHAIN_FILE=${vcpkg_toolchain}
          -DVCPKG_MANIFEST_DIR=$ENV{GITHUB_WORKSPACE}/lib/artist
          -DVCPKG_TARGET_TRIPLET=${{ matrix.config.triplet }})

        if (NOT "${{ runner.os }}" STREQUAL "Windows")
          # vcpkg sanitizes the environment; pass the platform pkg-config dir
          # through so GTK / OpenGL / fontconfig / freetype / harfbuzz resolve
          # (Homebrew on macOS, system multiarch dir on Linux).
          set(ENV{PKG_CONFIG_PATH} "${{ matrix.config.pkg_config_path }}:$ENV{PKG_CONFIG_PATH}")
          list(APPEND extra_args
            -DVCPKG_ENV_PASSTHROUGH_UNTRACKED=PKG_CONFIG_PATH)
        endif()

        execute_process(
          COMMAND ${CMAKE_COMMAND}
            -S . -B build
            -D CMAKE_BUILD_TYPE=$ENV{BUILD_TYPE}
            -G Ninja
            -D CMAKE_MAKE_PROGRAM=ninja
            ${extra_args}
          RESULT_VARIABLE result
          ERROR_VARIABLE error_message)
        if (NOT result EQUAL 0)
          message(FATAL_ERROR "Configure failed: ${error_message} - ${result}")
        endif()

    - name: Build
      shell: cmake -P {0}
      run: |
        if ("${{ runner.os }}" STREQUAL "Windows")
          execute_process(
            COMMAND "${{ matrix.config.environment_script }}" && set
            OUTPUT_FILE environment_script_output.txt)
          file(STRINGS environment_script_output.txt output_lines)
          foreach(line IN LISTS output_lines)
            if (line MATCHES "^([a-zA-Z0-9_-]+)=(.*)$")
              set(ENV{${CMAKE_MATCH_1}} "${CMAKE_MATCH_2}")
            endif()
          endforeach()
        endif()
        execute_process(
          COMMAND ${CMAKE_COMMAND} --build build
          RESULT_VARIABLE result ERROR_VARIABLE error_message)
        if (NOT result EQUAL 0)
          message(FATAL_ERROR "Build failed: ${error_message} - ${result}")
        endif()

    # Harvest the vcpkg installed tree (Skia + all deps, debug AND release) as a
    # compatibility-keyed prebuilt bundle on R2, for broad local-dev reuse
    # (link-compatible across compiler versions; consumed by cmake/SkiaPrebuilt
    # without vcpkg). Keyed by triplet (os+arch), not by exact ABI hash.
    - name: Harvest Skia prebuilt bundle to R2
      # Skip when the R2 secret is unavailable (e.g. fork PRs).
      if: env.AWS_ACCESS_KEY_ID != ''
      shell: bash
      run: |
        set -euo pipefail
        ver=148
        triplet="${{ matrix.config.triplet }}"
        installed="build/vcpkg_installed"
        test -d "$installed/$triplet"
        out="${triplet}.tar.zst"
        tar --zstd -C "$installed" -cf "$out" "$triplet"
        openssl dgst -sha256 "$out" | awk '{print $NF}' > "$out.sha256"
        echo "bundle $(du -h "$out" | cut -f1)  sha $(cat "$out.sha256")"
        base="s3://cycfi-media/skia-prebuilt/$ver"
        aws s3 cp "$out" "$base/$out" --endpoint-url "$AWS_ENDPOINT_URL"
        aws s3 cp "$out.sha256" "$base/$out.sha256" --endpoint-url "$AWS_ENDPOINT_URL"
        echo "uploaded skia-prebuilt/$ver/$out"

  ###########################################################################
  # Cairo  (system cairo on Unix; vcpkg cairo on Windows)
  ###########################################################################
  build-cairo:
    name: "Cairo (${{ matrix.config.name }})"
    if: >
      github.event_name != 'workflow_dispatch' ||
      inputs.job == 'all' ||
      inputs.job == 'cairo'
    runs-on: ${{ matrix.config.os }}
    # No binary cache: cairo + deps build fast from source on Windows, so they
    # are deliberately left out of the R2/vcpkg binary cache (Skia-only).
    strategy:
      fail-fast: false
      matrix:
        config:
        - name: "Windows MSVC"
          os: windows-latest
          environment_script: "C:/Program Files/Microsoft Visual Studio/2022/Enterprise/VC/Auxiliary/Build/vcvars64.bat"
        - name: "macOS Clang"
          os: macos-latest
        - name: "Ubuntu GCC"
          os: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install dependencies (Ubuntu)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libcairo2-dev \
          libgtk-3-dev \
          libfontconfig1-dev \
          libfreetype6-dev \
          libharfbuzz-dev \
          pkg-config \
          ninja-build

    - name: Install dependencies (macOS)
      if: runner.os == 'macOS'
      run: brew install cairo fontconfig freetype harfbuzz ninja

    - name: Install dependencies (Windows)
      if: runner.os == 'Windows'
      run: choco install ninja
      shell: cmd

    - name: Bootstrap vcpkg (Windows)
      if: runner.os == 'Windows'
      run: lib\artist\lib\external\vcpkg\bootstrap-vcpkg.bat -disableMetrics
      shell: cmd

    - name: Configure
      shell: cmake -P {0}
      run: |
        if ("${{ runner.os }}" STREQUAL "Windows")
          execute_process(
            COMMAND "${{ matrix.config.environment_script }}" && set
            OUTPUT_FILE environment_script_output.txt)
          file(STRINGS environment_script_output.txt output_lines)
          foreach(line IN LISTS output_lines)
            if (line MATCHES "^([a-zA-Z0-9_-]+)=(.*)$")
              set(ENV{${CMAKE_MATCH_1}} "${CMAKE_MATCH_2}")
            endif()
          endforeach()
        endif()

        set(extra_args -DELEMENTS_CAIRO=ON)
        if ("${{ runner.os }}" STREQUAL "Windows")
          # cairo (and its deps) come from the vcpkg manifest on Windows.
          list(APPEND extra_args
            -DCMAKE_TOOLCHAIN_FILE=$ENV{GITHUB_WORKSPACE}/lib/artist/lib/external/vcpkg/scripts/buildsystems/vcpkg.cmake
            -DVCPKG_MANIFEST_DIR=$ENV{GITHUB_WORKSPACE}/lib/artist)
        endif()

        execute_process(
          COMMAND ${CMAKE_COMMAND}
            -S . -B build-cairo
            -D CMAKE_BUILD_TYPE=$ENV{BUILD_TYPE}
            -G Ninja
            -D CMAKE_MAKE_PROGRAM=ninja
            ${extra_args}
          RESULT_VARIABLE result ERROR_VARIABLE error_message)
        if (NOT result EQUAL 0)
          message(FATAL_ERROR "Configure failed: ${error_message} - ${result}")
        endif()

    - name: Build
      shell: cmake -P {0}
      run: |
        if ("${{ runner.os }}" STREQUAL "Windows")
          execute_process(
            COMMAND "${{ matrix.config.environment_script }}" && set
            OUTPUT_FILE environment_script_output.txt)
          file(STRINGS environment_script_output.txt output_lines)
          foreach(line IN LISTS output_lines)
            if (line MATCHES "^([a-zA-Z0-9_-]+)=(.*)$")
              set(ENV{${CMAKE_MATCH_1}} "${CMAKE_MATCH_2}")
            endif()
          endforeach()
        endif()
        execute_process(
          COMMAND ${CMAKE_COMMAND} --build build-cairo
          RESULT_VARIABLE result ERROR_VARIABLE error_message)
        if (NOT result EQUAL 0)
          message(FATAL_ERROR "Build failed: ${error_message} - ${result}")
        endif()

  ###########################################################################
  # Quartz2D  (macOS only)
  ###########################################################################
  build-quartz2d:
    name: "Quartz2D (macOS Clang)"
    if: >
      github.event_name != 'workflow_dispatch' ||
      inputs.job == 'all' ||
      inputs.job == 'quartz2d'
    runs-on: macos-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install dependencies
      run: brew install fontconfig freetype ninja

    - name: Configure
      run: |
        cmake -S . -B build-quartz2d \
          -DELEMENTS_QUARTZ_2D=ON \
          -DCMAKE_BUILD_TYPE=$BUILD_TYPE \
          -G Ninja

    - name: Build
      run: cmake --build build-quartz2d
